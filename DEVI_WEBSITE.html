<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devi Biswas Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000000, #1a1a1a, #4b0000);
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .content {
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .subtitle {
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ff9e9e;
      font-size: 14px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    h1 span {
      color: #ff4d4d;
    }

    .description {
      color: #dddddd;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .contact {
      margin-bottom: 35px;
      font-size: 18px;
      line-height: 1.8;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .button-group a {
      text-decoration: none;
      color: white;
      padding: 14px 28px;
      border-radius: 14px;
      font-weight: bold;
      transition: 0.3s ease;
      display: inline-block;
    }

    .linkedin {
      background-color: #0077b5;
    }

    .behance {
      background-color: #6c3cff;
    }

    .youtube {
      background-color: #ff0000;
    }

    .button-group a:hover {
      transform: translateY(-3px);
      opacity: 0.9;
    }

    .image-section {
      min-height: 500px;
    }

    .image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 768px) {
      .content {
        padding: 40px 25px;
      }

      h1 {
        font-size: 42px;
      }

      .description,
      .contact {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="content">
      <p class="subtitle">WELCOME TO</p>

      <h1>Devi <span>Biswas</span></h1>

      <p class="description">
        Creative artist, designer, and storyteller crafting expressive visual experiences.
      </p>

      <div class="contact">
        <p>📞 7439672230</p>
        <p>✉️ devibiswas2910@gmail.com</p>
      </div>

      <div class="button-group">
        <a
          href="https://www.linkedin.com/in/devi-biswas-978b06317/"
          target="_blank"
          class="linkedin"
        >
          LinkedIn
        </a>

        <a
          href="https://www.behance.net/devibiswas"
          target="_blank"
          class="behance"
        >
          Behance
        </a>

        <a
          href="https://www.youtube.com/@AniDeviStudio"
          target="_blank"
          class="youtube"
        >
          YouTube
        </a>
      </div>
    </div>

    <div class="image-section">
      <img src="IMG_3324.JPG" alt="Devi Biswas">
    </div>
  </div>
</body>
</html>
